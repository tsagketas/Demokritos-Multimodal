evaluation:
  metrics:
    - accuracy
    - auc
    - eer
    - f1
    - precision
    - recall

  output_dir: /workspace/outputs/metrics
  save_txt: true
  save_csv: true
  per_category: true         # breakdown by FakeVideo/FakeAudio/etc.

  explainability:
    enabled: true
    method: sliding_window
    window_size: 0.5         # seconds
    step_size: 0.1           # seconds
    output_dir: /workspace/outputs/plots
