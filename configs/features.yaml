audio:
  handcrafted:
    enabled: true
    n_mfcc: 40
    n_fft: 2048
    hop_length: 512

  wav2vec2:
    enabled: true
    model_name: facebook/wav2vec2-base
    layer: -1

  hubert:
    enabled: true
    model_name: facebook/hubert-base-ls960
    layer: -1

visual:
  method: xception           # xception | landmarks
  enabled: true
  cache_dir: /workspace/outputs/features/visual
